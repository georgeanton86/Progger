name: Auto-deploy to main

on:
  push:
    branches: [claude/build-ehr-system-XSUok]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge to main
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git fetch origin
          git checkout main
          git merge origin/claude/build-ehr-system-XSUok -m "Auto-deploy"
          git push origin main
          git push origin main:claude/build-ehr-system-XSUok --force
