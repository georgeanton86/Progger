name: Auto-deploy to main

on:
  push:
    branches: [claude/build-ehr-system-XSUok]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge to main
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          git merge origin/claude/build-ehr-system-XSUok --ff-only
          git push origin main
